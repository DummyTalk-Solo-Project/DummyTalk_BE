name: dummytalk github_action deploy!

on:
  push:
    branches:
      - main
jobs:
  build-and-push-to-docker:
    runs-on: ubuntu-latest
    steps:
      - name: checking repo...
        uses: actions/checkout@v4

      - name: setting jdk...
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: build with gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: logging in docker...
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: build and push spring app image
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/dummytalk .
          docker push ${{secrets.DOCKER_USERNAME}}/dummytalk

      # Dockerfile-es 로 빌드한 Nori 플러그인 포함 ES 이미지를 Docker Hub에 올림
      # docker compose pull 시 이 이미지를 받아와야 Nori 플러그인이 정상 동작함
      - name: build and push elasticsearch-nori image
        run: |
          docker build -f docker/Dockerfile-es -t ${{secrets.DOCKER_USERNAME}}/elasticsearch-nori:8.11.1 .
          docker push ${{secrets.DOCKER_USERNAME}}/elasticsearch-nori:8.11.1

      - name: copy deploy files to ec2...
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USERNAME}}
          key: ${{secrets.EC2_PRIVATE_KEY}}
          # docker/ 와 scripts/ 구조를 EC2 에 그대로 복사 (디렉토리 구조 유지)
          source: "docker/docker-compose.yml, docker/prometheus.yml, scripts/deploy.sh"
          target: "~/dummytalk"

  ec2-deploy:
    needs: build-and-push-to-docker
    runs-on: ubuntu-latest
    steps:
      - name: working in ec2...
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USERNAME}}
          key: ${{secrets.EC2_PRIVATE_KEY}}
          script: |
            mkdir -p ~/dummytalk
            cd ~/dummytalk

            # PostgreSQL 접속 정보 (application.yml: ${DB_HOST}, ${DB_NAME}, ${DB_USERNAME}, ${DB_PASSWORD})
            echo "DB_HOST=${{secrets.DB_HOST}}" > .env
            echo "DB_NAME=${{secrets.DB_NAME}}" >> .env
            echo "DB_USERNAME=${{secrets.DB_USERNAME}}" >> .env
            echo "DB_PASSWORD=${{secrets.DB_PASSWORD}}" >> .env

            # 메일 발송
            echo "MAIL_SENDER_HOST=${{secrets.MAIL_SENDER_HOST}}" >> .env
            echo "MAIL_SENDER_USERNAME=${{secrets.MAIL_SENDER_USERNAME}}" >> .env
            echo "MAIL_SENDER_PASSWORD=${{secrets.MAIL_SENDER_PASSWORD}}" >> .env

            # Redis
            echo "REDIS_HOST=${{secrets.REDIS_HOST}}" >> .env

            # JWT
            echo "JWT_SECRET_KEY=${{secrets.JWT_SECRET_KEY}}" >> .env

            # OpenAI (application.yml: ${OPENAI_KEY})
            echo "OPENAI_KEY=${{secrets.OPENAI_KEY}}" >> .env

            # Elasticsearch - Spring 앱과 ES 컨테이너가 같은 Docker 네트워크에 있으므로 컨테이너명 사용
            echo "ES_URL=http://elasticsearch:9200" >> .env

            # Discord 웹훅
            echo "DISCORD_WEBHOOK=${{secrets.DISCORD_WEBHOOK}}" >> .env

            # docker-compose.yml의 elasticsearch image 태그에 사용 (${DOCKER_USERNAME}/elasticsearch-nori:8.11.1)
            echo "DOCKER_USERNAME=${{secrets.DOCKER_USERNAME}}" >> .env

            sudo docker login -u ${{secrets.DOCKER_USERNAME}} -p ${{secrets.DOCKER_PASSWORD}}
          
            chmod +x scripts/deploy.sh
            sudo bash scripts/deploy.sh 2>&1 | sudo tee deploy.log