services:
  spring:
    image: ${DOCKER_USERNAME}/dummytalk:latest
    container_name: DummyTalk_Spring
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgresql
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OPENAI_KEY=${OPENAI_KEY}
      - MAIL_SENDER_HOST=${MAIL_SENDER_HOST}
      - MAIL_SENDER_USERNAME=${MAIL_SENDER_USERNAME}
      - MAIL_SENDER_PASSWORD=${MAIL_SENDER_PASSWORD}
      - ES_URL=http://elasticsearch:9200
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
    depends_on:
      - postgresql
      - redis
      - elasticsearch
    restart: always
    networks:
      - dummytalk-network

  postgresql:
    image: postgres:15-alpine
    container_name: DummyTalk_Postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # batch_table_init.sql 은 EC2 에 복사되지 않으므로 주석 처리
      # - ./src/main/resources/sql/batch_table_init.sql:/docker-entrypoint-initdb.d/batch_table_init.sql
    restart: always
    networks:
      - dummytalk-network

#  mysql:
#    image: mysql:8.0
#    container_name: DummyTalk_MySQL
#    ports:
#      - "3306:3306"
#    environment:
#      MYSQL_DATABASE: ${DB_NAME}
#      MYSQL_USER: ${DB_USERNAME}
#      MYSQL_PASSWORD: ${DB_PASSWORD}
#      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
#    volumes:
#      - mysql_data:/var/lib/mysql
#      - ./src/main/resources/sql/batch_table_init.sql:/docker-entrypoint-initdb.d/batch_table_init.sql
#    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
#    restart: always

  redis:
    image: redis:7-alpine
    container_name: DummyTalk_Redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - dummytalk-network

  prometheus:
    image: prom/prometheus:latest
    container_name: DummyTalk_Prometheus
    ports:
      - "9090:9090"
    volumes:
      # prometheus.yml -> SCP 로 EC2 ~/dummytalk/docker/ 에 복사
      # docker compose -f docker/docker-compose.yml 실행 시 ./prometheus.yml = docker/prometheus.yml
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command: --config.file=/etc/prometheus/prometheus.yml
    restart: always
    networks:
      - dummytalk-network

  grafana:
    image: grafana/grafana:latest
    container_name: DummyTalk_Grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always
    networks:
      - dummytalk-network

  elasticsearch:
    # Nori 플러그인이 설치된 커스텀 이미지 (docker/Dockerfile-es 로 빌드 후 Docker Hub에 올림)
    # build + image 동시 사용 시 docker compose pull 이 공식 이미지를 덮어쓰는 문제 방지
    image: ${DOCKER_USERNAME}/elasticsearch-nori:8.11.1
    container_name: DummyTalk_ElasticSearch
    environment:
      - node.name=es01
      - cluster.name=dummy-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - dummytalk-network

  kibana:
    # Elasticsearch 와 버전을 반드시 맞춰야 함 (8.x 마이너 불일치 시 연결 실패)
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: DummyTalk_Kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - dummytalk-network

volumes:
  postgres_data:
  grafana_data:
  redis_data:
  es_data:


networks:
  dummytalk-network:
    driver: bridge