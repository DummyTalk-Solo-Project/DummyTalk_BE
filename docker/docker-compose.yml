services:
  nginx:
    image: nginx:alpine
    container_name: DummyTalk_Nginx
    ports:
      - "80:80"
      - "443:443"  # Cloudflare Full (Strict)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro # SCP로 EC2 ~/dummytalk/docker/ 에 복사
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - spring
    restart: always
    networks:
      - dummytalk-network

  spring:
    image: ${DOCKER_USERNAME}/dummytalk:latest
    container_name: DummyTalk_Spring
    expose: # nginx가 프록시하므로 외부 직접 접근 차단 (같은 container 끼리는 가능)
      - "8080"
    environment:
      # ZGC + ZGenerational: VT Continuation(단명 객체) 수거 최적화
      # G1GC(기본) → Young GC STW 10~200ms → VT 부하 시 p99 스파이크 원인
      # ZGenerational: Concurrent 수거, STW < 1ms, Young/Old 분리로 단명 객체 빠르게 수거
      - JAVA_TOOL_OPTIONS=-XX:+UseZGC -XX:+ZGenerational
      # Pinning 진단 시 위 줄을 아래로 교체 (JAVA_TOOL_OPTIONS는 하나만 유효)
      # - JAVA_TOOL_OPTIONS=-XX:+UseZGC -XX:+ZGenerational -Djdk.tracePinnedThreads=full
      # Virtual Thread Pinning 진단 — K6 부하 테스트 시에만 위 조합 줄로 교체
      # Pinning: synchronized 블록 내부 블로킹 I/O → Carrier Thread도 함께 블로킹
      # 의심 지점: Redisson 3.18.0 (RLock 내부), Hibernate (L1 Cache 동기화)
      - DB_HOST=postgresql
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OPENAI_KEY=${OPENAI_KEY}
      - MAIL_SENDER_HOST=${MAIL_SENDER_HOST}
      - MAIL_SENDER_USERNAME=${MAIL_SENDER_USERNAME}
      - MAIL_SENDER_PASSWORD=${MAIL_SENDER_PASSWORD}
      - ES_URL=http://elasticsearch:9200
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
    volumes:
      # 뱃지 이미지: EC2 /home/ubuntu/data/badges/
      # 컨테이너 /app/uploads/badges/ (read only)
      - /home/ubuntu/data/badges:/app/uploads/badges:ro
    # ES 늦게 켜져서 condition 추가
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: always
    networks:
      - dummytalk-network

  postgresql:
    image: postgres:15-alpine
    container_name: DummyTalk_Postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - dummytalk-network

  redis:
    image: redis:7-alpine
    container_name: DummyTalk_Redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - dummytalk-network

  prometheus:
    image: prom/prometheus:latest
    container_name: DummyTalk_Prometheus
    ports:
      - "9090:9090"
    volumes:
      # prometheus.yml -> SCP 로 EC2 ~/dummytalk/docker/ 에 복사
      # docker compose -f docker/docker-compose.yml 실행 시 ./prometheus.yml = docker/prometheus.yml
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command: --config.file=/etc/prometheus/prometheus.yml
    restart: always
    networks:
      - dummytalk-network

  grafana:
    image: grafana/grafana:latest
    container_name: DummyTalk_Grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always
    networks:
      - dummytalk-network

  elasticsearch:
    # Nori 플러그인이 설치된 커스텀 이미지 (docker/Dockerfile-es 로 빌드 후 Docker Hub에 올림)
    # build + image 동시 사용 시 docker compose pull 이 공식 이미지를 덮어쓰는 문제 방지
    image: ${DOCKER_USERNAME}/elasticsearch-nori:8.11.1
    container_name: DummyTalk_ElasticSearch
    environment:
      - node.name=es01
      - cluster.name=dummy-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      # 단일 노드 기준 256MB로 돌리기 ( 512MB는 1GB RAM EC2에서 GC 폭주 )
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: always
    networks:
      - dummytalk-network

  kibana:
    # Elasticsearch 와 버전을 반드시 맞춰야 함 (8.x 마이너 불일치 시 연결 실패)
    # profiles: monitoring -> 기본 docker compose up -d 에서 제외, 수동으로만 = 메모리 및 스토리지 부족...
    profiles: ["monitoring"]
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: DummyTalk_Kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - dummytalk-network

volumes:
  postgres_data:
  grafana_data:
  redis_data:
  es_data:


networks:
  dummytalk-network:
    driver: bridge