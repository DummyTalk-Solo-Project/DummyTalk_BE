global:
  scrape_interval:     15s

scrape_configs:
  # Prometheus 자체 모니터링
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot 애플리케이션 모니터링
  - job_name: 'dummytalk-be'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 1s # 테스트 대비 5s -> 1s 로 줄임 (끝나고 높힐 것)
    static_configs:
      # docker-compose 서비스명 기준으로 지정 (container_name 아님)
      # Docker 내부 DNS는 서비스명(spring)을 호스트명으로 등록한다.
      # container_name(DummyTalk_Spring)의 언더스코어는 Tomcat 10.x Host 헤더 검증에서 RFC 위반으로 400 반환.
      - targets: ['spring:8080']

