global:
  scrape_interval:     15s

scrape_configs:
  # Prometheus 자체 모니터링
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot 애플리케이션 모니터링
  - job_name: 'dummytalk-be'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      # deploy.sh 에서 docker run --name DummyTalk_Spring 으로 기동하므로 컨테이너명 사용
      - targets: ['DummyTalk_Spring:8080']

