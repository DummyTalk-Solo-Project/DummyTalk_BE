global:
  scrape_interval:     15s

scrape_configs:
  # Prometheus 자체 모니터링
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot 애플리케이션 모니터링
  - job_name: 'dummytalk-be'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      # docker-compose container_name: DummyTalk-Spring (same network 내 DNS 해석)
      - targets: ['DummyTalk-Spring:8080']

