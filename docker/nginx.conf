# HTTPS 리디렉션
# Let's Encrypt ACME 챌린지는 80포트에서 처리해야 하므로 예외 처리
server {
    listen 80;
    server_name api.dummytalk.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Spring 8080 리버스 프록시
server {
    listen 443 ssl;
    server_name api.dummytalk.kr;

    ssl_certificate     /etc/letsencrypt/live/api.dummytalk.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dummytalk.kr/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://spring:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}