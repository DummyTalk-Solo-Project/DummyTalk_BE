logging:
  level:
    org.hibernate.SQL: DEBUG

spring:
  threads:
    virtual:
      enabled: false

  application:
    name: DummyTalk_BE

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME} # PostgreSQL 용
#    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 1000
        jdbc:
          batch_size: 50
    show-sql: false

  data:
    elasticsearch:
      repositories:
        enabled: true
      url: ${ES_URL}

    redis:
      host: ${REDIS_HOST}
      port: 6379

  sql:
    init:
      mode: never

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: true

  mail:
    host: ${MAIL_SENDER_HOST}
    port: 587
    username: ${MAIL_SENDER_USERNAME}
    password: ${MAIL_SENDER_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
      auth-code-expiration-millis: 300000

  ai:
    openai:
      api-key: ${OPENAI_KEY}
      chat:
        options:
          model: gpt-4-turbo
          temperature: 0.7

jwt:
  secret:
    key: ${JWT_SECRET_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

  health:
    elasticsearch:
      enabled: false

discord:
  webhook:
    url: ${DISCORD_WEBHOOK}

# K6 테스트용 더미 유저 적재 (TestMemberDataLoader)
# false(기본값) = 비활성, true = 앱 기동 시 test1~200@test.com 자동 생성
# EC2 시딩 방법은 TestMemberDataLoader.java 주석 참고
test:
  load-users: false

# ─── getDummy() 동시성 전략 K6 비교 설정 ──────────────────────────────────────
# K6 stage 테스트 시 아래 두 값만 바꾸고 EC2 재배포 후 측정
#
# Stage 1: getDummy-version: 1, interceptor-enabled: false
#   → 순수 @Transactional (Race Condition 발생 확인, race_condition_suspect 측정)
#
# Stage 2: getDummy-version: 2, interceptor-enabled: false
#   → @Transactional + @DistributedLock (따닥 차단, hikaricp 안정화 측정)
#
# Stage 3: getDummy-version: 3, interceptor-enabled: true  (현재 운영 설정)
#   → @Transactional + IdempotentRequestInterceptor (interceptor_block_429_count 측정)
concurrency:
  getDummy-version: 3      # 1 = V1(순수트랜잭션) / 2 = V2(분산락) / 3 = V3(인터셉터, default)
  interceptor-enabled: true # false = V1/V2 테스트 시 인터셉터 비활성화

# prod 프로파일 없이 배포 환경에서 Swagger 비활성화
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false