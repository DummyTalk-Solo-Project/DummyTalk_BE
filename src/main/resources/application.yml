logging:
  level:
    org.hibernate.SQL: DEBUG

spring:
  application:
    name: DummyTalk_BE

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME} # PostgreSQL 용
#    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 1000
        jdbc:
          batch_size: 50
    show-sql: false

  data:
    elasticsearch:
      repositories:
        enabled: true
      url: ${ES_URL}

    redis:
      host: ${REDIS_HOST}
      port: 6379

  sql:
    init:
      mode: never

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: true

  mail:
    host: ${MAIL_SENDER_HOST}
    port: 587
    username: ${MAIL_SENDER_USERNAME}
    password: ${MAIL_SENDER_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
      auth-code-expiration-millis: 300000

  ai:
    openai:
      api-key: ${OPENAI_KEY}
      chat:
        options:
          model: gpt-4-turbo
          temperature: 0.7

jwt:
  secret:
    key: ${JWT_SECRET_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

  health:
    elasticsearch:
      enabled: false

discord:
  webhook:
    url: ${DISCORD_WEBHOOK}